version: "3.9"
services:
  app:
    build: .
    container_name: ai-business-operator
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
    volumes:
      - ./reports:/app/reports
      - ./memory/vector_store:/app/memory/vector_store
